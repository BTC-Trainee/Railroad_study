<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운행선 관리 암기앱 (인증형)</title>
    <style>
        /* 기본 스타일 */
        body { font-family: 'Malgun Gothic', sans-serif; padding: 15px; background: #f4f7f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* 인증 화면 스타일 */
        #login-area { text-align: center; padding: 40px 0; }
        .login-input { width: 80%; padding: 15px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .btn-login { background: #004a99; color: white; width: 85%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        /* 메인 학습 영역 (초기 숨김) */
        #main-app { display: none; }
        
        /* 학습 UI 스타일 */
        .header h1 { font-size: 1.1rem; color: #004a99; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #question-area { background: #fff; border: 2px solid #e1e8ed; padding: 20px; border-radius: 15px; min-height: 100px; font-weight: bold; font-size: 1.1rem; text-align: center; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; color: #222; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        button { padding: 15px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-next { background: #004a99; color: white; grid-column: span 2; }
        .btn-start { background: #ea4335; color: white; }
        .btn-stop { background: #34a853; color: white; }
        #status { text-align: center; font-size: 0.9rem; color: #555; margin-bottom: 15px; }
        .result-panel { background: #fdfdfd; padding: 20px; border-radius: 15px; border: 1px solid #eee; display: none; }
        .score-box { text-align: center; margin-bottom: 15px; }
        .score-val { font-size: 2.5rem; font-weight: 900; color: #d93025; }
        .real-answer { background: #e8f0fe; padding: 15px; border-radius: 10px; font-size: 0.95rem; line-height: 1.6; color: #1a73e8; margin-top: 10px; }
        .user-answer { font-style: italic; color: #555; margin-bottom: 10px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-area">
            <h2 style="color:#004a99">교육생 인증</h2>
            <p style="color:#666; font-size:0.9rem;">배정받은 교번 6자리를 입력하세요.</p>
            <input type="number" id="student-id" class="login-input" placeholder="교번 입력">
            <button class="btn-login" onclick="checkAccess()">인증 및 시작</button>
        </div>

        <div id="main-app">
            <div class="header"><h1>운행선 관리 실기 (1~36번)</h1></div>
            <div id="question-area">준비가 되면 '다음 질문'을 누르세요.</div>
            <div id="status">대기 중</div>
            <div class="btn-group">
                <button class="btn-next" onclick="nextQuiz()">다음 질문</button>
                <button id="startBtn" class="btn-start" onclick="startRec()" disabled>답변 시작</button>
                <button id="stopBtn" class="btn-stop" onclick="stopRec()" disabled>답변 완료</button>
            </div>
            <div id="result-panel" class="result-panel">
                <div class="score-box"><span class="score-val" id="score">0</span>% 일치</div>
                <div id="user-ans-text" class="user-answer"></div>
                <strong>교재 정답 전문:</strong>
                <div id="real-ans-text" class="real-answer"></div>
            </div>
        </div>
    </div>

    <script>
        // 허용된 교번 리스트 (총 11명)
        const allowedIds = [
            '260801', '260802', '260803', '260804', '260805', '260806', '260807', '260808',
            '260901', '260902', '260903'
        ];

        function checkAccess() {
            const inputId = document.getElementById('student-id').value;
            if (allowedIds.includes(inputId)) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                alert("인증에 실패했습니다. 올바른 교번을 입력해 주세요.");
            }
        }

        // 1~36번 퀴즈 데이터 전문
        const quizList = [
            {q: "1. 관제사가 역장(철도운행안전관리자)으로부터 철도운행안전협의서를 제출받아 협의해야 할 사항", a: "① 열차 지장여부 검토 협의 ② 차단작업 계획 통보 및 협의 ③ 운전명령 처리된 차단작업 열차사이차단작업 관련 장비이동계획과 작업계획 협의 ④ 열차운행선 안전확보 방안 ⑤ 역장, 관제사, 기관사와의 연락 방법 ⑥ 사용중지 대상 철도차량운행시설물"},
            {q: "2. 관제센터장이 승인한 관제승인의 정의", a: "① 선로작업과 관련한 공사열차 이동 ② 사고 등 이례사항 발생 시 긴급한 작업 또는 열차서행 ③ 긴급한 사유로 인한 통과열차의 임시정차 ④ 긴급한 사유로 인한 선로작업 취소 ⑤ 철도교통관제운영규정(고시) 운전정리 주요사항과 임시 운전명령 사항"},
            {q: "3. 철도운행안전협의 시 철도운행안전관리자와 역장이 상호 협의해야 할 사항", a: "① 운전명령 처리된 선로작업계획 및 차단장비 이동계획 ② 철도차량운행시설물 사용중지 대상 및 열차 지장여부(임시열차 포함) ③ 운전취급 변경사항 및 열차운행선 안전 확보 방안 ④ 작업관계자와 역장, 관제사, 승무원과의 연락 방법 ⑤ 병행작업 총괄책임자 지정 및 안전관리 사항 ⑥ 변경차단작업인 경우 사전 합동점검 결과 미비사항 조치여부(작업책임자로부터 제출된 합동점검 결과 미비사항 조치결과서를 확인) ⑦ 기타 필요한 사항"},
            {q: "4. 일반선 및 연결선에서 선로작업 시 작업시행 승인 절차", a: "① 철도운행안전관리자는 역장에게 작업시행 승인 요청 ② 역장은 관제사에게 작업시행 승인 요청 ③ 관제사는 열차운행상황 등을 확인한 후 승인 ④ 관제사는 승인을 요청한 역장에게 승인내용 통보 ⑤ 역장은 철도운행안전관리자에게 승인내용 통보"},
            {q: "5. 철도보호지구에서의 안전운행 저해행위", a: "① 폭발물이나 인화물질 등 위험물을 제조·저장하거나 전시하는 행위 ② 철도차량 운전자 등이 선로나 신호기를 확인하는 데 지장을 주거나 줄 우려가 있는 시설이나 설비를 설치하는 행위 ③ 철도신호등(鐵道信號燈)으로 오인할 우려가 있는 시설물이나 조명 설비를 설치하는 행위 ④ 전차선로에 의하여 감전될 우려가 있는 시설이나 설비를 설치하는 행위 ⑤ 시설 또는 설비가 선로의 위나 밑으로 횡단하거나 선로과 나란히 되도록 설치하는 행위 ⑥ 그 밖에 열차의 안전운행과 철도 보호를 위하여 필요하다고 인정하여 국토교통부장관이 정하여 고시하는 행위"},
            {q: "6. 철도보호를 위한 안전조치사항", a: "① 공사로 인하여 약해질 우려가 있는 지반에 대한 보강대책 수립·시행 ② 선로 옆의 제방 등에 대한 흙막이공사 시행 ③ 굴착공사에 사용되는 장비나 공법 등의 변경 ④ 지하수나 지표수 처리대책의 수립·시행 ⑤ 시설물의 구조 검토·보강 ⑥ 먼지나 티끌 등이 발생하는 시설·설비나 장비를 운용하는 경우 방진막, 물을 뿌리는 설비 등 분진방지시설 설치 ⑦ 신호기를 가리거나 신호기를 보는데 지장을 주는 시설이나 설비 등의 철거 ⑧ 안전울타리나 안전통로 등 안전시설의 설치 ⑨ 그 밖에 철도시설의 보호 또는 철도차량의 안전운행을 위하여 필요한 안전조치"},
            {q: "7. 전차선로 근접작업 시 안전관리(작업책임자 업무)", a: "① 작업책임자는 전차선로에 근접하여 시행하는 작업의 경우 급전장애와 감전사고 예방을 위하여 다음 각 호의 조치를 취해야 한다. 가. 전차선로에 지장을 줄 우려가 있거나 전차선로의 급 단전이 필요한 경우 전기안전관리자 배치 나. 전차선로와 이격거리가 1m 이내인 작업은 전차선로 단전 조치 다. 이물질 낙하 우려 시 낙하물 방지시설 설치 라. 필요 시 전차선로 가압부에 절연방호관 설치"},
            {q: "8. 관제사가 운전명령을 발령해야 하는 작업 내용", a: "① 선로작업시간 부여 ② 공사열차번호 부여 ③ 열차서행 승인 및 해제 ④ 폐색방식 변경 및 단선운전 승인 ⑤ 기타 운전정리에 필요한 임시 운전명령"},
            {q: "9. 최초열차 운행 시 관제사의 업무", a: "① 현장 역·소의 운전취급자에게는 최초열차에 주의사항과 작업시행 이후 최초열차임을 통보하도록 한다. ② 최초열차의 운행상황을 감시하고 작업구간을 통과한 이후 현장상태를 확인한다. ③ 이상 유무를 확인하여 작업책임자에게 내용을 통보하도록 현장 역·소 운전취급자에게 지시한다."},
            {q: "10. 전차선로 단전 및 급전취급", a: "가. 전차선로 단전취급은 ① 전기운용자로부터 전차선로 단전 협의를 받은 관제사는 단전구간에 운행 중인 전기 차량이 없음을 확인한 후 단전 시작시각 및 급전 예정시각을 전기운용자와 관계 역·소장에게 통보하여야 한다. ② 관제사로부터 통보를 받은 전기운용자는 해당구간 전차선로에 단전을 시킨 후 관제사 및 전기안전관리자에게 단전되었음을 통보하여야 한다. ③ 통보를 받은 전기안전관리자는 단전이 된 것을 검전기로 확인한 후 접지걸이를 설치하는 등의 안전조치를 시행하고 그 내용을 작업책임자에게 통보하여야 한다. 나. 전차선로 급전취급은 ① 작업책임자는 관제사가 승인한 단전시간을 고려하여 급전 예정시각 5분 전까지 작업을 완료하고 그 내용을 전기안전관리자에게 통보하여야 한다. ② 작업책임자로부터 통보를 받은 전기안전관리자는 전차선로에 급전을 하여도 이상이 없음을 확인한 후 접지걸이를 철거하고 전기운용자에게 그 내용을 통보하여야 한다. ③ 전기안전관리자로부터 통보를 받은 전기운용자는 관제사와 급전에 대하여 협의한 후 급전하여야 하며, 급전을 완료하였을 때에는 관제사에게 이를 통보하여야 한다. ④ 전기운용자로부터 통보를 받은 관제사는 관계 역ž소장에게 이를 통보함과 동시에 전기차량 운행에 지장 없음을 알려야 한다."},
            {q: "11. 작업 지연 시 조치", a: "① 승인된 시간 내에 작업완료가 불가능한 경우 작업책임자는 작업종료 예정시간 10분 전까지(변경차단작업은 30분 전까지) 작업시행을 협의한 역장 또는 관제사에게 작업 연장 승인을 요청하여야 한다. ② 승인요청을 받은 관제사는 열차운행상황 등을 파악한 다음 승인하고 운전정리의 조치를 취해야 한다. ③ 관제사는 작업연장을 승인한 경우 작업구간 인접역장으로 하여금 승무 중인 승무원에게 작업연장 내용을 통보하도록 지시하여야 한다."},
            {q: "12. 야간 지장작업에 투입되었던 장비의 유치 및 이동 관련 업무", a: "① 관제사는 열차운행선지장작업과 관련하여 장비의 이동을 통제하여야 한다. ② 지장작업의 문서열람 및 작업계획의 수립과정에서 관련 장비의 유치역을 확인한다. ③ 관련 장비의 유치역에서 작업을 관할하는 역까지의 장비이동을 위한 열차번호 및 스케줄을 작성하여 현장 역·소에 통보한다. ④ 장비의 이동순서는 가급적 작업에 투입되는 순서에 부합하도록 조정한다. ⑤ 장비의 이동은 일반열차의 운행에 지장을 받지 않는 범위 내에서 이동할 수 있도록 설정한다. ⑥ 장비가 이동되는 동안 현장 역·소의 운전취급 상황과 장비가 이동하는 궤도의 이상 유무를 감시한다. ⑦ 지장작업 중에도 장비의 이동상황과 운전취급의 상황을 감시하여야 한다. ⑧ 작업이 완료되면 장비를 유치할 역을 확인하고 이동할 열차번호와 스케줄을 작성하여 현장 역·소에 통보한다."},
            {q: "13. 철도보호지구에서 지역본부장이 작업중지를 요청할 수 있는 사항", a: "① 승인되지 않은 임의작업 ② 지정된 작업책임자, 열차감시원, 전기안전관리자, 건설기계의 작업지휘자 또는 유도자 등이 배치되지 않거나 현장을 이탈한 경우 ③ 관계소속과 일상 작업으로 협의되었으나 철도차량 운행에 지장이 우려되는 경우 ④ 관계소속과 상호 협의된 철도차량운행시설물에 대한 보호조치를 이행하지 않은 경우 ⑤ 그 밖에 철도시설의 손괴 또는 철도차량의 안전운행을 저해할 우려가 있는 경우"},
            {q: "14. 용어의 정의(철도, 선로, 궤도, 철도시설)", a: "① 철도: 여객 또는 화물을 운송하는 데 필요한 철도시설과 철도차량 및 이와 관련된 운영·지원체계가 유기적으로 구성된 운송체계 ② 선로: 철도차량을 운행하기 위한 궤도와 이를 받치는 노반 또는 공작물로 구성된 시설물 ③ 궤도: 레일, 침목, 도상과 이들의 부속품으로 구성된 시설 ④ 철도시설: 철도차량이 운행 중이거나 운행예정인 선로, 철도의 전철전력설비, 정보통신설비, 신호 및 열차제어설비, 여객 또는 화물취급에 필요한 승강장 및 적하장 등"},
            {q: "14-1. 용어의 정의(철도보호지구, 운영상황실, 철도교통관제센터, 관제운영실, 선로작업)", a: "① 철도보호지구: 철도경계선으로부터 30m 이내의 지역 ② 운영상황실: 관제업무와 공사내 관련부서와의 긴급한 업무를 종합적으로 조정하고 각종 재난 및 이례사항에 대한 총체적 위기관리센터 기능을 수행하는 곳 ③ 철도교통관제센터: 관제업무와 현업 역·소의 운전취급 및 작업에 대한 승인·통제·조정 등의 기능을 직접 수행하는 장소 ④ 관제운영실: 이례사항에 대한 상황 전파, 사고수습 및 복구의 초동 지휘, 임시 수송계획 및 열차 운행제한의 의사 결정 업무를 담당하는 장소 ⑤ 선로작업: 철도보호지구 작업 중 철도차량의 운행에 지장을 주거나 지장을 줄 우려가 있는 작업으로서 차단작업과 열차사이차단작업으로 구분"},
            {q: "15. 차단장비번호의 운용", a: "① 차단장비번호는 차단장비가 출발하는 역의 역장이 부여하며 구내 작업인 경우에도 부여한다. 다만, 고속선 작업에 투입되는 장비는 관제사가 부여한다. ② 차단장비번호는 각 장비별로 번호를 부여한다. 다만, 2이상의 장비를 서로 연결하고 관통제동 취급을 하는 경우에는 1개의 차단장비번호에 의하여 운전할 수 있다. ③ 부여 기준: 매일 최초 차단장비번호는 14시를 기준으로 한다. 차단구간에 최초로 진입하는 차단장비를 1호로 하고 이후 순차적으로 익일 14시 전까지 부여한다. 이미 사용한 번호는 익일 14시 전에는 재차 사용할 수 없다."},
            {q: "16. 열차감시원의 보호구와 휴대품", a: "① 안전보호구(안전조끼, 안전모 등) 착용 ② 인접 정거장과 무선통화가 가능한 무선전화기 ③ 작업시간대 작업구간 운행예정인 열차의 운전시각표 ④ 확성기·경보기 등 작업원 대피를 위한 경보설비 ⑤ 주간: 적색기, 백색기 / 야간: 적색등, 백색등"},
            {q: "17. 2이상의 차단장비를 동시에 운행할 때 운전취급", a: "① 차단장비간의 거리는 200m이상 확보 ② 역장은 관계 건널목에 차단장비 운전내용 통보 ③ 각 차단장비는 무선전화기를 휴대하고 운전 중 상호간 위치 및 속도를 확인하는 등 주의력 가지고 운전 ④ 출발역장은 인접역장에게 마지막으로 출발한 차단장비번호를 통보 ⑤ 도착역장은 마지막 차단장비가 완전히 도착한 것을 확인 후 그 구간에 대하여 개통취급"},
            {q: "18. 종합시험운행 시 안전관리책임자의 업무", a: "① 산업안전보건법 등 관련 법령에서 정한 안전조치사항의 점검·확인 ② 종합시험운행을 실시하기 전의 안전점검 및 종합시험운행 중 안전관리 감독 ③ 종합시험운행에 사용되는 철도차량에 대한 안전 통제 ④ 종합시험운행에 사용되는 안전장비의 점검·확인 ⑤ 종합시험운행 참여자에 대한 안전교육"},
            {q: "19. 병행작업 총괄작업책임자 지정", a: "① 2이상의 분야가 합동작업 또는 병행작업을 시행하는 경우 분야별 작업책임자를 지휘·통제할 수 있는 총괄작업책임자를 지정하여야 한다. 가. 합동작업인 경우 시행부서장이 사전에 지정하여 선로작업계획서에 반영한다. 나. 병행작업인 경우 철도운행안전협의 시 분야별 작업책임자 간 협의를 통하여 지정하고 역장은 이를 관제사에게 통보한다. 다. 작업구간이 중첩되거나 차단장비 운행구간 내 다른 작업이 시행되는 경우에 한하여 지정한다."},
            {q: "20. 용어의 정의(관제업무종사자, 선로배분시행자, 영업시운전)", a: "① 관제업무종사자: 철도교통의 안전과 질서를 유지하기 위하여 철도차량의 운행을 감시·통제·집중제어하는 업무에 종사하는 자 ② 선로배분시행자: 선로용량의 배분에 관한 업무를 수행하는 자 ③ 영업시운전: 시설물검증시험이 끝난 후 실제 영업상태를 가정하고 열차운행체계 및 철도종사자의 업무 숙달 등을 점검하는 시험"},
            {q: "21. 지장작업 완료 및 전차선 급전 관련 업무", a: "① 관제사는 작업 완료 통보를 받으면 작업구간 내 장비 및 차량 운행이 없는지 확인한다. ② 현장철수 완료를 확인한다. ③ 전차선 급전을 하여도 문제가 없는지 확인한다. ④ 작업완료시각을 역 운전취급자와 상호 기록하고 제어권을 복귀한다. ⑤ 전기운용자에게 급전 준비 완료를 통보한다. ⑥ 급전 완료 통보를 받으면 역 운전취급자에게 알리고 열차의 출고를 지시한다. ⑦ 이후 열차운행상황을 감시한다."},
            {q: "22. 철도보호지구 안에서의 행위 중 국토교통부장관에게 신고해야할 사항", a: "① 토지의 형질변경 및 굴착 ② 토석, 자갈 및 모래의 채취 ③ 건축물의 신축·개축·증축 또는 인공구조물의 설치 ④ 나무의 식재 ⑤ 그 밖에 철도시설을 파손하거나 철도차량의 안전운행을 방해할 우려가 있는 행위"},
            {q: "23. 종합시험운행의 정의 및 종류", a: "① 정의: 정상운행하기 전에 철도시설 및 열차운행체계의 안정성 여부, 정상운행 준비여부를 점검하는 시험 ② 종류: 시설물검증시험, 영업시운전"},
            {q: "24. 종합시험운행계획 수립 시 포함되어야 하는 사항", a: "① 종합시험운행의 방법 및 절차 ② 평가항목 및 평가기준 등 ③ 종합시험운행의 일정 ④ 실시 조직 및 소요인원 ⑤ 사용되는 시험기기 및 장비 ⑥ 교육훈련계획 ⑦ 안전관리조직 및 안전관리계획 ⑧ 비상대응계획"},
            {q: "25. 작업 전 안전교육 내용", a: "① 당일 작업계획(작업순서와 방법 등) ② 개인별 임무 ③ 열차감시인, 건널목임시관리원 지정 및 임무, 근무요령 ④ 그 밖의 안전사고예방을 위한 사항"},
            {q: "26. 모타카의 적재 및 견인중량", a: "① 차체에 적재중량과 견인중량을 표기하여야 하며 중량을 초과하여 운전할 수 없다. ② 자동연결기와 공기관통제동기를 갖춘 경우 화차를 연결하고 운전할 수 있다. ③ 제동시험 등 운전상 이상 없음을 확인한 후 운전하여야 한다."},
            {q: "27. 철도시설장비의 종류", a: "① 중보선장비: 멀티플타이탬퍼(MTT), 밸러스트콤팩터(CO) 등 선로보수 정비 담당 ② 전철보수장비: 모터카, 건주작업차 등 전차선로 보수 정비 담당 ③ 시험차량: 종합검측차, 궤도검측차 등 정기적인 점검 담당"},
            {q: "28. 작업완료 시각기준", a: "① 작업원, 장비, 공기구 등이 열차운행선을 벗어나 안전한 지역으로 철수한 시각 ② 차단장비가 기지 또는 역에 완전히 도착한 시각 ③ 선로 정상기능을 확보한 시각 ④ 전차선로 정상기능 확보 및 급전한 시각 ⑤ 신호보안장치 정상기능을 확보한 시각"},
            {q: "29. 지장작업 시행 구간에서의 열차운행과 통제 관련 업무", a: "① 관제사는 열차 및 차량운행을 통제하여야 한다. ② 전차선단전 구간 진입 역 신호기는 정지 현시 지시한다. ③ 단전과 관련 없는 차량도 신호표시 전 관제사 지시를 받도록 한다. ④ 인접선 운행 열차에 주의운전 통보한다. ⑤ 장비 이동을 감시한다. ⑥ 관제승인 및 주의사항은 열차운행 직전에 부여한다."},
            {q: "30. 작업 중 긴급 상황 발생 시 관제사 조치사항", a: "① 우선적으로 열차방호조치 시행여부를 확인한다. ② 위험개소로 진입하는 열차를 운행중지 시킨다. ③ 관련사령에 통보하여 위험상황이 신속히 해소되도록 한다. ④ 위험요인이 완전히 해소되었다는 보고 전까지 작업을 계속하거나 열차운행을 재개할 수 없다."},
            {q: "31. 전차선 단전취급 시 조치사항", a: "① 전기운용자로부터 협의를 받으면 구간 내 전기차가 없음을 확인한다. ② 시작시각 및 급전 예정시각을 관계자에게 통보한다. ③ 단전 보고를 수신한다. ④ 역장에게 단전을 통보하고 작업을 시행한다."},
            {q: "32. 일반선 선로지장작업 승인 및 안전조치", a: "① 협의서와 열차운행상황을 확인하고 단전을 확인한다. ② 제어모드를 로컬모드로 승인하고 전환한다. ③ L/S표시판에 선로차단작업구간이 표시되도록 조치한다. ④ 단전구간 및 시간을 통보하고 전기차 운행 금지를 지시한다."},
            {q: "33. 일반선 작업시행 중 열차운행선 지장 시 조치", a: "① 열차운행을 즉시 운행중지 시키고 인접선 방호조치를 시행한다. ② 관제운영실장에게 보고한다. ③ 지장 내용을 확인하고 관련사령과 협의한다. ④ 지장우려가 해소된 것을 확인하고 재개 조치한다."},
            {q: "34. 작업완료 후 협의 및 장비도착 확인", a: "① 작업책임자는 역장과 출발예정시각, 운행순서를 협의하여야 한다. ② 타 역 유치 시 협의사항을 협의서에 기록한다. ③ 역장은 협의사항을 상대역장과 관제사에게 통보한다. ④ 도착 시 마지막 장비명과 도착시각을 통보한다. ⑤ 역장은 그 내용을 관제사와 인접역장에게 통보한다."},
            {q: "35. 노면전차의 안전운행 저해행위 등", a: "① 깊이 10미터 이상의 굴착 ② 높이 10미터 이상의 건설기계 또는 인공구조물 설치 ③ 위험물 지정수량 이상 제조 저장 또는 전시"},
            {q: "36. 작업 전 안전교육", a: "1) 당일 작업계획(시설물 사용중지 계획, 작업순서, 개인별 임무 등) 2) 선로 특성 및 운전취급 변경 사항 3) 열차감시원 배치 및 작업자 보호 4) 전기안전관리자 배치 및 단전 안전관리 5) 건널목 임시관리원 배치 6) 철도시설 보호 7) 그 밖의 안전사고 예방 사항"}
        ];

        let currentQuiz = null;
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        
        recognition.lang = 'ko-KR';
        recognition.interimResults = true;

        function nextQuiz() {
            const idx = Math.floor(Math.random() * quizList.length);
            currentQuiz = quizList[idx];
            document.getElementById('question-area').innerText = currentQuiz.q;
            document.getElementById('result-panel').style.display = 'none';
            document.getElementById('status').innerText = "상태: 답변 버튼을 누르고 말씀하세요.";
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function startRec() {
            recognition.start();
            document.getElementById('status').innerText = "상태: 녹음 중... 말씀하세요.";
            startBtn.disabled = true;
            stopBtn.disabled = false;
        }

        function stopRec() {
            recognition.stop();
            document.getElementById('status').innerText = "상태: 분석 중...";
            stopBtn.disabled = true;
        }

        recognition.onresult = function(event) {
            let userText = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                userText += event.results[i][0].transcript;
            }
            document.getElementById('user-ans-text').innerText = "내 답변: " + userText;
            
            if (event.results[0].isFinal) {
                calculateScore(userText, currentQuiz.a);
            }
        };

        function calculateScore(userText, realAnswer) {
            // 정답 텍스트와 비교 로직
            const keywords = realAnswer.split(/[\s,①②③④⑤⑥⑦⑧⑨⑩가나다라마바사\(\)\.\,]+/).filter(w => w.length > 1);
            let matches = 0;
            keywords.forEach(word => {
                if (userText.includes(word)) matches++;
            });

            const score = Math.round((matches / keywords.length) * 100);
            document.getElementById('score').innerText = score > 100 ? 100 : score;
            document.getElementById('real-ans-text').innerText = realAnswer;
            document.getElementById('result-panel').style.display = 'block';
            document.getElementById('status').innerText = "상태: 확인 완료";
        }

        recognition.onerror = () => {
            document.getElementById('status').innerText = "상태: 인식 오류 발생.";
            startBtn.disabled = false;
        };
    </script>
</body>
</html>
