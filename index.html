<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>철도관제 실기 62항목 암기앱</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 15px; background: #f8f9fa; color: #333; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eef2f6; padding-bottom: 15px; }
        .header h1 { font-size: 1.3rem; color: #1a73e8; margin: 0; }
        #question-box { background: #fff; border: 2px solid #eef2f6; padding: 20px; border-radius: 15px; min-height: 80px; margin-bottom: 20px; font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; text-align: center; color: #202124; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-next { background: #1a73e8; color: white; grid-column: span 2; }
        .btn-mic { background: #ea4335; color: white; }
        .btn-hint { background: #fbbc04; color: #fff; }
        #status { text-align: center; font-size: 0.85rem; color: #70757a; margin-bottom: 15px; }
        .result-panel { background: #f1f3f4; padding: 20px; border-radius: 15px; display: none; }
        .score-wrap { text-align: center; margin-bottom: 15px; }
        .score-label { font-size: 0.9rem; color: #5f6368; }
        .score-val { font-size: 2.2rem; font-weight: 800; color: #d93025; }
        .text-diff { font-size: 0.95rem; margin-top: 10px; border-top: 1px solid #dadce0; padding-top: 15px; }
        .real-ans { color: #188038; font-weight: 600; margin-top: 5px; background: #e6f4ea; padding: 10px; border-radius: 8px; }
        .user-ans { color: #1967d2; margin-bottom: 10px; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>제5장 운행선 관리 (62항목)</h1>
        </div>

        <div id="question-box">아래 '다음 질문' 버튼을 눌러주세요.</div>
        
        <div id="status">대기 중...</div>

        <div class="btn-group">
            <button class="btn-next" onclick="generateQuestion()">다음 질문 (무작위)</button>
            <button id="micBtn" class="btn-mic" onclick="startMic()" disabled>답변 시작 (음성)</button>
            <button id="hintBtn" class="btn-hint" onclick="toggleHint()" disabled>정답 보기</button>
        </div>

        <div id="result-panel" class="result-panel">
            <div class="score-wrap">
                <span class="score-label">핵심 키워드 일치율</span><br>
                <span id="score-val" class="score-val">0</span><span class="score-val">%</span>
            </div>
            <div class="text-diff">
                <strong>본인 답변:</strong>
                <div id="user-ans" class="user-ans"></div>
                <strong>실제 정답 (핵심 내용):</strong>
                <div id="real-ans" class="real-ans"></div>
            </div>
        </div>
    </div>

    <script>
        // 교재 96~121p 기반 62항목 데이터 세트 
        const data = [
            {q: "1. 관제사가 역장으로부터 협의서 제출받아 협의할 사항은?", a: "열차 지장여부 검토, 차단작업 계획 통보, 장비이동계획, 안전확보 방안, 연락 방법, 사용중지 시설물"},
            {q: "2. 관제센터장이 승인하는 '관제승인'의 정의는?", a: "공사열차 이동, 이례사항 긴급작업 또는 서행, 임시정차, 선로작업 취소, 운전정리 및 임시 운전명령"},
            {q: "3. 안전관리자와 역장이 상호 협의해야 할 사항은?", a: "선로작업 및 장비이동계획, 사용중지 대상 및 지장여부, 운전취급 변경 및 안전확보 방안, 연락 방법, 총괄책임자 지정, 합동점검 미비사항 조치"},
            {q: "4. 일반선 선로작업 시 작업시행 승인 절차는?", a: "안전관리자가 역장에게 요청, 역장이 관제사에게 요청, 관제사가 확인 후 승인, 역장 통보, 안전관리자 통보, 작업원 통보"},
            {q: "5. 철도보호지구에서의 안전운행 저해행위는?", a: "위험물 제조 저장, 신호확인 지장시설, 신호등 오인 조명설비, 전차선 감전 우려 시설, 선로 횡단 평행 설치"},
            {q: "6. 철도보호를 위한 안전조치 사항은?", a: "지반보강, 흙막이공사, 장비 공법 변경, 지하수 처리, 구조 검토, 분진방지, 신호기 철거, 안전시설 설치"},
            {q: "7. 전차선로 근접작업 시 안전관리 조치는?", a: "전기안전관리자 배치, 1미터 이내 작업 시 단전 조치, 낙하물 방지시설, 절연방호관 설치"},
            {q: "8. 관제사의 운전명령 발령 업무 내용은?", a: "작업시간 부여, 공사열차번호 부여, 서행 승인, 폐색방식 변경, 단선 운전 승인"},
            {q: "9. 최초열차 운행 시 관제사 업무는?", a: "주의사항 통보, 운행상황 감시, 현장상태 확인, 이상유무 보고 지시"},
            {q: "10. 전차선로 단전 및 급전취급 절차는?", a: "단전: 전기운용자 협의, 관제사 통보, 단전, 검전 및 접지 / 급전: 5분전 완료통보, 접지 철거, 전기운용자 급전, 관제사 통보"},
            {q: "11. 작업 지연 시 조치 방법은?", a: "종료 10분전(변경차단 30분전) 연장 승인 요청, 관제사 열차상황 파악 후 승인, 인접역장 및 승무원 통보"},
            {q: "12. 야간 지장작업 장비의 유치 및 이동 업무는?", a: "이동 통제, 유치역 확인, 열차번호 및 스케줄 작성 통보, 이동순서 조정, 궤도 이상유무 감시, 완료 후 유치역 확인"},
            {q: "13. 철도보호지구 작업중지 요청 사항은?", a: "임의작업, 필수인원 미배치, 열차 지장 우려, 보호조치 미이행, 시설 손괴 또는 안전저해 우려"},
            {q: "14. 철도, 선로, 궤도, 철도시설의 정의는?", a: "철도: 운송체계, 선로: 궤도와 노반, 궤도: 레일 침목 도상, 철도시설: 운행시설 및 역 운영시설"},
            {q: "14-1. 보호지구, 운영상황실, 관제센터, 선로작업의 정의?", a: "보호지구: 궤도 끝선 30미터, 운영상황실: 위기관리센터, 관제센터: 직접 수행 장소, 선로작업: 차단 및 열차사이차단"},
            {q: "15. 차단장비번호의 운용 기준은?", a: "출발역장 부여, 장비별 부여(연결 시 1개), 14시 기준 1호부터 순차 부여, 재사용 불가"},
            {q: "16. 열차감시원의 보호구와 휴대품은?", a: "안전보호구, 무선전화기, 운전시각표, 경보설비, 수신호기(기 또는 등)"},
            {q: "17. 2이상의 차단장비 동시 운행 시 운전취급은?", a: "거리 200미터 이상 확보, 건널목 통보, 무선전화 주의운전, 마지막 장비번호 통보, 도착 확인 후 개통"},
            {q: "18. 종합시험운행 안전관리책임자의 업무는?", a: "안전조치 점검 확인, 사전 안전점검 및 감독, 철도차량 안전 통제, 안전장비 확인, 안전교육"},
            {q: "19. 병행작업 총괄작업책임자의 지정 기준은?", a: "분야별 책임자 지휘 통제, 합동작업 시 사전 지정, 병행작업 시 협의 지정, 중첩 시 지정, 조정 및 통제"},
            {q: "20. 관제업무종사자, 선로배분, 영업시운전 정의는?", a: "관제종사자: 감시 통제 제어 업무, 선로배분: 용량 배분 업무, 영업시운전: 실제 영업상태 가정 점검"},
            {q: "21. 지장작업 완료 및 급전 관련 업무 절차는?", a: "장비 차량 부재 확인, 현장 철수 확인, 급전 이상 유무 확인, 시각 기록 및 모드 전환, 전기운용자 급전 통보, 출고 지시"},
            {q: "22. 철도보호지구 내 신고해야 할 행위는?", a: "형질변경 및 굴착, 토석 채취, 건축물 신축 증축, 나무 식재, 시설 파손 우려 행위"},
            {q: "23. 종합시험운행의 정의와 종류는?", a: "정상운행 전 안정성 및 준비여부 점검, 시설물검증시험 및 영업시운전"},
            {q: "24. 종합시험운행계획 수립 시 포함 사항은?", a: "방법 및 절차, 평가항목 및 기준, 일정, 조직 및 인원, 기기 및 장비, 교육훈련, 안전관리, 비상대응"},
            {q: "25. 작업책임자의 작업 전 안전교육 내용은?", a: "당일 작업계획, 개인별 임무, 열차감시원 및 건널목관리원 지정, 안전사고 예방 사항"},
            {q: "26. 모타카의 적재 및 견인중량 규정은?", a: "차체 표기 및 준수, 화차 연결 운전 량수 제한, 상호 연결 및 제동시험 확인"},
            {q: "27. 철도시설장비의 종류는?", a: "중보선장비(MTT, CO), 전철보수장비(모터카, 건주작업차), 시험차량"},
            {q: "28. 작업완료 시각의 기준은?", a: "인원 장비 철수 시각, 기지 역 도착 시각, 선로 정상기능 확보, 전차선 급전 완료, 신호보안장치 정상화"},
            {q: "29. 지장작업 구간 열차운행과 통제 업무는?", a: "열차 차량 통제, 신호기 정지 현시 지시, 관제사 지시 수신, 인접선 주의운전 통보, 장비 감시, 관제승인 부여"},
            {q: "30. 작업 중 긴급 상황 시 관제사 조치는?", a: "열차방호 확인, 위험구간 진입 열차 중지, 관련사령 통보, 해소 전까지 재개 금지"},
            {q: "31. 전차선 단전취급 시 관제사 조치사항은?", a: "전기차 부재 확인, 시각 통보, 단전 보고 수신, 역장 통보 및 작업 시행"},
            {q: "32. 일반선 선로지장작업 승인 및 안전조치는?", a: "협의서 및 상황 확인, 로컬모드 전환, L/S표지판 설정, 단전구간 및 시간 통보"},
            {q: "33. 일반선 작업 중 운행선 지장 시 조치는?", a: "즉시 운행중지 및 방호, 관제운영실장 보고, 지장 확인 및 협의, 해소 후 재개"},
            {q: "34. 작업완료 후 협의 및 장비도착 확인은?", a: "귀환 협의, 유치역 변경 협의, 상대역장 통보, 마지막 장비명 및 도착시각 통보"},
            {q: "35. 노면전차 안전운행 저해행위 기준은?", a: "10미터 이상 굴착, 10미터 이상 건설기계 및 인공구조물 설치, 위험물 제조 저장"},
            {q: "36. 작업 전 안전교육(신규) 포함 내용은?", a: "작업계획 및 임무, 선로 특성 및 취급 변경, 열차감시원 배치, 전기안전관리자 배치, 건널목 관리원 배치, 장비 사용 시설 보호"},
            {q: "37. 작업 중 안전관리(추가) 관리 항목은?", a: "열차감시원, 전기안전관리자, 건널목관리원, 유도자 배치, 작업표지, 안전설비, 단전 확인, 수신호등, 쇄정상태, 궤도단락, 안전구 착용"},
            {q: "38. 차단작업 및 열차사이차단작업의 정의?", a: "차단작업: 시설물 정상취급 중지 또는 운행 중지 작업, 열차사이차단: 열차 사이 가용시간대 시행"},
            {q: "39. 열차 방호의 종류 5가지는?", a: "무선전화기 방호, 열차표지 방호, 정지수신호 방호, 방호스위치 방호, 역구내 신호기 일괄제어 방호"},
            {q: "40. 열차 방호 시행의 원칙과 생략 조건은?", a: "양쪽 시행 원칙, 열차 안옴 확실하거나 무선통보 확인 시 수신호 또는 표지방호 생략 가능"},
            {q: "41. 일반선의 작업시간 부여 기준은?", a: "선로사용중지: 마지막열차 통과후~최초출발 5분전, 단전작업: 마지막전기차 통과후~최초출발 5분전"},
            {q: "42. 고속선 및 연결선 작업시간 부여 기준은?", a: "사용중지: 통과후~진입 10분전(주간 5분), 단전: 통과후~진입 10분전"},
            {q: "43. 열차 서행운전의 승인 시 고려사항은?", a: "운전명령 요청 절차, 이격거리 30km 이상 확보, 지연 최소화 노력, 임시신호기 또는 SLP 설치"},
            {q: "44. 연결선 선로작업 시행 승인 절차는?", a: "장비없음: 관제사 승인 및 통보, 고속선 진입: 고속관제사 승인 및 통보, 일반선 진입: 역장 요청 및 연결관제사 승인"},
            {q: "45. 일상 작업 중 지장 발생 시 처리 방법?", a: "즉시 중지, 역장 통보, 관제사 보고 및 운행중지, 지장 해소 후 통보, 확인 전 재개 금지"},
            {q: "46. 긴급작업의 시행 규정은?", a: "천재지변 등 사고 시 승인 후 즉시 시행, 임시신호기 설치 및 통보, 장기 중지 후 사용개시 절차 준용"},
            {q: "47. 도급회사 장비이동 승인 절차는?", a: "30km 이하: 본부장 요청 및 선로배분자 승인, 30km 초과: 지역본부장 및 물류본부장 거쳐 운전명령"},
            {q: "48. 공사열차 운행협의 포함 사항은?", a: "작업종류, 구간 시간 경로, 조성, 운전제한, 성명 및 연락방법, 주의사항"},
            {q: "49. 공사열차 기지에서 고속선 진출 승인 절차?", a: "승인신청, 관제사 요구, 운전정리, 진로제어 및 진행신호 현시, 출발지시"},
            {q: "50. 단전 전후 및 작업승인 진행 순서는?", a: "상황 확인, 역소 호출 준비 확인, 전기운용자 통보, 단전시각 통보, 승인번호 채번, 주의사항 통보, 로컬 전환 확인, 감시"},
            {q: "51. 작업 완료 및 지연 시 관제사 조치는?", a: "지연사유 확인 및 연장 승인, 관련 사령 및 운영실 통보, 승무원 통고 조치"},
            {q: "52. 장비운행 시 관제사의 일반적 조치사항은?", a: "조성순서 변경 협조, 단전구간 진입 통제, 지장여부 확인, 속도 준수 지시, 이동지점 명확화 및 복창 확인, 진로 확보, 작업 상황 감시"},
            {q: "53. 철도보호지구 나무 식재 금지 기준은?", a: "전방 시야 지장, 전차선 신호기 침범 우려, 쓰러짐으로 시설 훼손 및 운행 지장 우려"},
            {q: "54. 철도시설의 범위(7가지)는?", a: "선로 역 건축물, 보수 차량 기지, 전철 신호 통신 설비, 연계 시설, 개발 시험 시설, 교육훈련 시설, 기타 시설"},
            {q: "55. 철도 건설 유지보수 운영을 위한 시설은?", a: "자재 가공 보관 시설, 진입로 주차장 야적장, 장비 정비 점검 시설, 안전 및 안내 시설"},
            {q: "56. 작업책임자, 안전관리자, 협의담당자 정의는?", a: "작업책임자: 지휘 감독자, 안전관리자: 자격증 보유 전문인력, 협의담당자: 자격 갖춘 공사 직원"},
            {q: "57. 일상작업, 일반작업, 주요작업의 구분은?", a: "일상: 지장 없는 점검 보수, 일반: 기설정 작업시간 내 보수차단, 주요: 일반 제외 보수차단 및 모든 변경차단"},
            {q: "58. 선로배분시행자, 전기운용자, 전기관리자 정의?", a: "배분시행자: 용량 배분, 전기운용자: 급단전 협의 조치, 전기관리자: 현장 급단전 협의 및 안전관리"},
            {q: "59. 작업책임자의 지정 및 배치 규정은?", a: "현장 배치 필수, 여러 분야 시 총괄 지휘 직원 배치, 현장 상주 및 복수 지정"},
            {q: "60. 철도운행안전관리자 배치 기준은?", a: "현장 배치 필수, 1개소 1명 원칙, 동시다발 작업 시 복수 배치"},
            {q: "61. 철도장비 운전 형태별 제한속도는?", a: "전도주시 곤란 10km이하, 모터카 견인 70 밀기 25km이하, 트로리 종류별 10에서 50km이하"},
            {q: "62. 작업계획 수립 시 관제사 관련 업무는?", a: "계획 수립, 차단 작업 구분, 단전 및 장비 필요 여부 구분, 경합 확인, 운행조정 전달, 노트 작성, 중요사항 인수인계"}
        ];

        let currentQuiz = null;
        const micBtn = document.getElementById('micBtn');
        const hintBtn = document.getElementById('hintBtn');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        
        recognition.lang = 'ko-KR';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        function generateQuestion() {
            const randomIndex = Math.floor(Math.random() * data.length);
            currentQuiz = data[randomIndex];
            
            document.getElementById('question-box').innerText = currentQuiz.q;
            document.getElementById('result-panel').style.display = 'none';
            document.getElementById('status').innerText = "상태: 답변을 시작하세요.";
            
            micBtn.disabled = false;
            hintBtn.disabled = false;
        }

        function startMic() {
            recognition.start();
            document.getElementById('status').innerText = "상태: 듣고 있습니다... 핵심 단어를 포함해 말하세요.";
            micBtn.style.background = "#5f6368";
        }

        recognition.onresult = function(event) {
            const userText = event.results[0][0].transcript;
            document.getElementById('user-ans').innerText = userText;
            evaluateAnswer(userText);
            micBtn.style.background = "#ea4335";
        };

        function evaluateAnswer(userText) {
            const realAnswer = currentQuiz.a;
            // 핵심 키워드 추출 (쉼표와 공백 기준)
            const keywords = realAnswer.replace(/[\(\)\*]/g, "").split(/[, ]+/).filter(w => w.length > 1);
            
            let matches = 0;
            keywords.forEach(word => {
                if (userText.includes(word.trim())) matches++;
            });

            const score = Math.round((matches / keywords.length) * 100);
            
            document.getElementById('score-val').innerText = score;
            document.getElementById('real-ans').innerText = realAnswer;
            document.getElementById('result-panel').style.display = 'block';
            document.getElementById('status').innerText = "상태: 분석 완료. 다음 질문을 누르세요.";
        }

        function toggleHint() {
            const panel = document.getElementById('result-panel');
            if (panel.style.display === 'none') {
                document.getElementById('user-ans').innerText = "(답변 생략)";
                document.getElementById('real-ans').innerText = currentQuiz.a;
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
        }

        recognition.onerror = function() {
            document.getElementById('status').innerText = "상태: 마이크 오류. 다시 시도하세요.";
            micBtn.style.background = "#ea4335";
        };
    </script>
</body>
